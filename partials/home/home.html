<section id="home-screen" class="home-screen" aria-labelledby="home-title">
    <div class="home-copy">
        <h1 id="home-title">PTE Learning System</h1>
    </div>

    <div class="home-features" aria-label="功能選單">
        <a id="start-review" class="feature-tile" href="pages/practice.html" aria-label="Open practice page">
            <span class="feature-tile-art" aria-hidden="true">
                <img src="assets/func_label.svg" alt="">
            </span>
            <span class="feature-tile-label">Practice</span>
        </a>

        <a id="start-tests" class="feature-tile" href="pages/exams.html" aria-label="Open exams">
            <span class="feature-tile-art" aria-hidden="true">
                <img src="assets/func_label.svg" alt="">
            </span>
            <span class="feature-tile-label">Exams</span>
        </a>

        <a id="start-favorites" class="feature-tile" href="pages/favorites.html" aria-label="Open favorites page">
            <span class="feature-tile-art" aria-hidden="true">
                <img src="assets/func_label.svg" alt="">
            </span>
            <span class="feature-tile-label">Favorites</span>
        </a>

        <a id="start-setting" class="feature-tile" href="pages/setting.html" aria-label="Open setting page">
            <span class="feature-tile-art" aria-hidden="true">
                <img src="assets/func_label.svg" alt="">
            </span>
            <span class="feature-tile-label">Setting</span>
        </a>

    <div id="setting-popup" class="setting-popup" role="dialog" aria-modal="true" aria-labelledby="setting-title" hidden>
        <div class="setting-popup-window practice-popup-window custom-scrollbar-host">
            <button id="setting-popup-close" class="setting-popup-close" type="button" aria-label="Close setting">x</button>
            <div id="setting-popup-body" class="setting-popup-body custom-scrollbar-content"></div>
            <div class="custom-scrollbar" aria-hidden="true">
                <div class="custom-scrollbar-thumb"></div>
            </div>
        </div>
    </div>

    <div id="practice-popup" class="setting-popup practice-popup" role="dialog" aria-modal="true" aria-labelledby="quiz-title" hidden>
        <div class="setting-popup-window practice-popup-window custom-scrollbar-host">
            <button id="practice-popup-close" class="setting-popup-close" type="button" aria-label="Close practice">x</button>
            <div id="practice-popup-body" class="setting-popup-body practice-popup-body custom-scrollbar-content"></div>
            <div class="custom-scrollbar" aria-hidden="true">
                <div class="custom-scrollbar-thumb"></div>
            </div>
        </div>
    </div>

    <div id="favorites-popup" class="setting-popup favorites-popup" role="dialog" aria-modal="true" aria-labelledby="favorites-title" hidden>
        <div class="setting-popup-window practice-popup-window custom-scrollbar-host">
            <button id="favorites-popup-close" class="setting-popup-close" type="button" aria-label="Close favorites">x</button>
            <div id="favorites-popup-body" class="setting-popup-body practice-popup-body custom-scrollbar-content"></div>
            <div class="custom-scrollbar" aria-hidden="true">
                <div class="custom-scrollbar-thumb"></div>

    <div id="tests-popup" class="setting-popup tests-popup" role="dialog" aria-modal="true" aria-labelledby="tests-title" hidden>
        <div class="setting-popup-window practice-popup-window custom-scrollbar-host">
            <button id="tests-popup-close" class="setting-popup-close" type="button" aria-label="Close exams">x</button>
            <div id="tests-popup-body" class="setting-popup-body practice-popup-body tests-popup-body custom-scrollbar-content"></div>
            <div class="custom-scrollbar" aria-hidden="true">
                <div class="custom-scrollbar-thumb"></div>
            </div>
        </div>
    </div>
</section>
