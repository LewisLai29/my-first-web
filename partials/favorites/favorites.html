<section id="favorites-screen" class="favorites-screen" aria-labelledby="favorites-title">
    <div class="favorites-header">
        <h1 id="favorites-title">Favorites</h1>
        <a class="favorites-back-link" href="../index.html">Home</a>
    </div>

    <p id="favorites-status" class="favorites-status" aria-live="polite">Loading favorites...</p>
    <div id="favorites-groups" class="favorites-groups" hidden>
        <details class="favorites-group" open>
            <summary class="favorites-group-header">
                <div>
                    <span class="favorites-group-eyebrow">Words</span>
                    <h2 id="vocab-favorites-title">Vocabulary</h2>
                </div>
                <span id="vocab-favorites-count" class="favorites-group-count">0</span>
            </summary>
            <div class="favorites-group-content">
                <p id="vocab-favorites-empty" class="favorites-empty">No favorite vocabulary yet.</p>
                <ul id="favorites-list" class="favorites-list"></ul>
            </div>
        </details>

        <details class="favorites-group" open>
            <summary class="favorites-group-header">
                <div>
                    <span class="favorites-group-eyebrow">Phrases</span>
                    <h2 id="collocation-favorites-title">Collocations</h2>
                </div>
                <span id="collocation-favorites-count" class="favorites-group-count">0</span>
            </summary>
            <div class="favorites-group-content">
                <p id="collocation-favorites-empty" class="favorites-empty">No favorite collocations yet.</p>
                <ul id="collocation-favorites-list" class="favorites-list"></ul>
            </div>
        </details>
    </div>
</section>
