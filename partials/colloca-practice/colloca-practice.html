<div id="colloca-practice-content" class="collocation-practice-layout">
    <section class="collocation-workspace" aria-labelledby="practice-title">
        <h2 id="practice-title" class="visually-hidden">Unlimited collocation practice</h2>

    <div class="collocation-stats" aria-live="polite">
        <span id="card-index">Card: --</span>
        <span id="score-count" class="collocation-score">Remembered: 0</span>
    </div>
    <div id="loading-state" class="collocation-state">Loading collocations...</div>

    <div id="card-area" hidden>
        <div id="collocation-card" class="collocation-card" role="button" tabindex="0" aria-label="翻面查看搭配詞解釋" aria-pressed="false">
            <div class="collocation-card-inner">
                <article class="collocation-card-face collocation-card-front">
                    <button id="collocation-favorite-toggle" class="favorite-toggle" type="button" aria-label="Add to favorites" aria-pressed="false" hidden>
                        <svg class="favorite-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M12 17.3 6.2 20.8l1.6-6.6L2.7 9.7l6.8-.6L12 3l2.5 6.1 6.8.6-5.1 4.5 1.6 6.6z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                        </svg>
                        <span class="visually-hidden">Add to favorites</span>
                    </button>
                    <span id="collocation-pattern" class="pattern-badge"></span>
                    <h2 id="collocation-phrase">Loading...</h2>
                    <p>點擊卡片查看中文說明與例句</p>
                    <div class="voice-controls">
                        <button id="speak-phrase" class="speak-button collocation-speak" type="button" aria-label="朗讀搭配詞" title="朗讀搭配詞">
                            <svg class="speak-button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10v4h4l5 4V6L7 10H3z" fill="currentColor"></path><path d="M16.5 8.5a4.5 4.5 0 0 1 0 7M19.5 5.5a9 9 0 0 1 0 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path></svg>
                        </button>
                        <select id="collocation-voice-select" class="voice-select" aria-label="Voice"></select>
                    </div>
                </article>
                <article class="collocation-card-face collocation-card-back">
                    <div class="collocation-card-back-scroll">
                        <h3 id="collocation-chinese" class="collocation-meaning"></h3>
                        <p id="collocation-explanation" class="collocation-explanation"></p>
                        <div class="collocation-example-block">
                            <span>Example</span>
                            <p id="collocation-example"></p>
                            <p id="collocation-example-zh" class="example-zh"></p>
                        </div>
                    </div>
                </article>
            </div>
        </div>
        <p id="collocation-favorite-status" class="favorite-status-message" aria-live="polite"></p>
        <div class="collocation-actions">
            <button id="mark-forgot" class="action-forgot" type="button">Forgot</button>
            <button id="mark-remembered" class="action-remembered" type="button">Remembered</button>
        </div>
    </div>

    </section>

    <section id="review-list-section" class="review-list-section" aria-labelledby="review-list-title" hidden>
        <div class="review-list-heading">
            <div>
                <span class="review-list-eyebrow">Learning trail</span>
                <h2 id="review-list-title">Review collocations</h2>
            </div>
            <div class="review-list-score" aria-label="Review accuracy">
                <strong id="review-accuracy">0%</strong>
                <span>accuracy</span>
            </div>
        </div>

        <div class="review-list-summary" aria-live="polite">
            <span><strong id="reviewed-count">0</strong> completed</span>
            <span><strong id="review-right-count">0</strong> remembered</span>
        </div>

        <div class="review-list-filters" role="group" aria-label="Filter reviewed collocations">
            <button class="review-filter active" type="button" data-review-filter="all" aria-pressed="true">All</button>
            <button class="review-filter" type="button" data-review-filter="right" aria-pressed="false">Remembered</button>
            <button class="review-filter" type="button" data-review-filter="wrong" aria-pressed="false">Review again</button>
        </div>

        <ul id="review-list" class="review-list">
            <li class="review-list-empty">
                <span class="review-list-empty-icon" aria-hidden="true">01</span>
                <strong>Your learning trail starts here</strong>
                <span>Answer a collocation card and it will appear here.</span>
            </li>
        </ul>
    </section>
</div>
