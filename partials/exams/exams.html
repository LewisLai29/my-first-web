<section id="tests-home-view" class="tests-view tests-home-view" aria-labelledby="tests-title">
    <div class="tests-heading">
        <h2 id="tests-title">Exams</h2>
        <p>Choose today's vocabulary exam mode.</p>
    </div>

    <label class="tests-mode-toggle" for="cloze-endless-mode">
        <span>
            <strong>Endless mode</strong>
            <span>Keep drawing random questions from all 570 words in Cloze Exam.</span>
        </span>
        <span class="tests-toggle-control">
            <input id="cloze-endless-mode" type="checkbox">
            <span class="tests-toggle-track" aria-hidden="true"></span>
        </span>
    </label>

    <div class="tests-options" aria-label="Exam modes">
        <button id="start-daily-quiz" class="tests-option" type="button">
            <span>
                <strong>Vocabulary Exam</strong>
                <span>Flip cards and mark yourself correct or wrong.</span>
            </span>
            <span class="tests-option-action" aria-hidden="true">Start</span>
        </button>

        <button id="start-daily-exam" class="tests-option" type="button">
            <span>
                <strong>Cloze Exam</strong>
                <span>Choose the word that completes the sentence.</span>
            </span>
            <span class="tests-option-action" aria-hidden="true">Start</span>
        </button>
    </div>

    <button id="open-exam-history" class="exam-history-link" type="button">
        <span>
            <strong>Exam history</strong>
            <span>Review previous scores and wrong answers.</span>
        </span>
        <span aria-hidden="true">View</span>
    </button>
</section>

<section id="tests-session-view" class="tests-view tests-session-view" hidden>
    <button id="tests-back" class="tests-back-button" type="button">Back</button>
    <div id="tests-session-body"></div>
</section>
