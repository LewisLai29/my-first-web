<section id="quiz-box" aria-labelledby="quiz-title" hidden>
    <h2 id="quiz-title" class="visually-hidden">Daily quiz</h2>

    <div class="stats">
        <span id="card-index">Card: -- / 15</span>
        <span class="score-count" id="score-count">Correct: 0</span>
    </div>

    <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" id="progress"></div>
    </div>

    <div class="quiz-container">
        <div class="card" id="word-card" role="button" tabindex="0" aria-label="Flip vocabulary card">
            <div class="card-face card-front">
                <button id="favorite-toggle" class="favorite-toggle" type="button" aria-label="Add to favorites" aria-pressed="false" hidden>
                    <svg class="favorite-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M12 17.3 6.2 20.8l1.6-6.6L2.7 9.7l6.8-.6L12 3l2.5 6.1 6.8.6-5.1 4.5 1.6 6.6z" fill="currentColor"></path>
                    </svg>
                    <span class="visually-hidden">Add to favorites</span>
                </button>
                <h2>
                    <span class="pos-tag" id="word-pos"></span>
                    <span id="word-target">Loading...</span>
                </h2>
                <p>Tap to reveal the meaning and example.</p>
                <div class="voice-controls">
                    <button id="speak-word" class="speak-button" type="button" title="Speak word" aria-label="Speak word">
                        <svg class="speak-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M3 10v4h4l5 4V6L7 10H3z" fill="currentColor"></path>
                            <path d="M16.5 8.5a4.5 4.5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                            <path d="M19.5 5.5a9 9 0 0 1 0 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                        </svg>
                        <span class="visually-hidden">Speak word</span>
                    </button>
                    <select id="voice-select" class="voice-select" aria-label="Voice"></select>
                </div>
            </div>

            <div class="card-face card-back">
                <h3 id="word-meaning">Meaning</h3>
                <p class="example" id="word-example">Loading example...</p>

                <section class="detail-section" aria-labelledby="word-family-title">
                    <h4 id="word-family-title">Word family</h4>
                    <ul class="detail-list" id="word-family"></ul>
                </section>

                <section class="detail-section" aria-labelledby="word-collocations-title">
                    <h4 id="word-collocations-title">Collocations</h4>
                    <ul class="detail-list" id="word-collocations"></ul>
                </section>
            </div>
        </div>
    </div>
    <p id="favorite-status" class="favorite-status-message" aria-live="polite"></p>

    <div class="btn-group">
        <button class="btn-wrong" type="button" id="mark-wrong">Forgot</button>
        <button class="btn-right" type="button" id="mark-right">Remembered</button>
    </div>
</section>
