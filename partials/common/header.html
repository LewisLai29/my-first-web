<header class="site-header">
    <div class="header-auth-row">
        <div class="auth-panel" aria-label="Sign in controls">
            <span id="auth-summary-status" class="auth-status" aria-live="polite">Not signed in</span>
            <button id="auth-open-sign-in" class="auth-button" type="button">Sign in</button>
            <button id="auth-sign-out" class="auth-button auth-button-secondary" type="button" hidden>Sign out</button>
        </div>
    </div>
    <div id="header-copy" class="header-copy" hidden>
        <div class="header-copy-row">
            <h1>PTE vocabulary daily review</h1>
            <a class="header-home-link" href="../index.html">Home</a>
        </div>
        <span class="date-badge" id="today-date">-----</span>
        <div class="deck-switcher" role="tablist" aria-label="Review day switcher">
            <button id="deck-today" class="deck-switch-button" type="button" data-offset="0" aria-pressed="true">Today</button>
            <button id="deck-yesterday" class="deck-switch-button" type="button" data-offset="-1" aria-pressed="false">Yesterday</button>
        </div>
        <div class="hint-text">Tap the card to check the answer, then mark whether you remembered it.</div>
    </div>
</header>
