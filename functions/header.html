<header>
    <h1>PTE vocabulary daily review</h1>
    <span class="date-badge" id="today-date">-----</span>
    <div class="deck-switcher" role="tablist" aria-label="Review day switcher">
        <button id="deck-today" class="deck-switch-button" type="button" data-offset="0" aria-pressed="true">Today</button>
        <button id="deck-yesterday" class="deck-switch-button" type="button" data-offset="-1" aria-pressed="false">Yesterday</button>
    </div>
    <div class="hint-text">Tap the card to check the answer, then mark whether you remembered it.</div>
</header>
