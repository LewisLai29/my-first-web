<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTE 每日跨日鎖定抽考系統</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #ca8a04;
            --background: #f1f5f9;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 5px; color: #0f172a; font-size: 1.8rem; }
        .date-badge {
            background-color: #e2e8f0;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #475569;
            font-weight: bold;
        }
        .hint-text {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 5px;
        }
        .progress-bar {
            background-color: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }
        /* 翻牌卡片 */
        .quiz-container {
            perspective: 1000px;
            height: 260px;
            margin-bottom: 25px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s ease;
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 25px;
            box-sizing: border-box;
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
        }
        .card-front h2 {
            font-size: 2.4rem;
            color: var(--primary);
            margin: 0;
            letter-spacing: 0.5px;
        }
        .card-front p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .speak-button {
            flex: 0 0 auto;
            margin-top: 16px;
            width: 52px;
            height: 52px;
            padding: 0;
            border-radius: 50%;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: var(--primary);
            font-size: 1.35rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .speak-button:hover {
            background: #dbeafe;
        }
        .speak-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .voice-controls {
            width: min(100%, 360px);
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .voice-controls .speak-button {
            margin-top: 0;
        }
        .voice-select {
            flex: 1;
            min-width: 0;
            height: 42px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #f8fafc;
            color: #1e293b;
            padding: 0 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .voice-select:disabled {
            opacity: 0.55;
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: #f8fafc;
        }
        .card-back h3 {
            font-size: 1.6rem;
            color: #0f172a;
            margin: 0 0 12px 0;
        }
        .example {
            font-style: italic;
            color: #475569;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.4;
            background: #edd;
            padding: 10px;
            border-radius: 8px;
            background-color: #f1f5f9;
        }
        .example-word {
            appearance: none;
            border: 0;
            background: transparent;
            color: inherit;
            display: inline;
            flex: 0 0 auto;
            padding: 0 1px;
            border-radius: 3px;
            font: inherit;
            font-style: inherit;
            font-weight: inherit;
            text-decoration: underline dotted #94a3b8;
            text-underline-offset: 3px;
            cursor: pointer;
        }
        .example-word:hover,
        .example-word:focus-visible {
            color: var(--primary);
            background: #dbeafe;
            outline: none;
        }
        .lookup-popup {
            position: fixed;
            z-index: 20;
            max-width: min(260px, calc(100vw - 24px));
            padding: 10px 12px;
            border-radius: 8px;
            background: #0f172a;
            color: #fff;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.25);
            font-size: 0.9rem;
            line-height: 1.35;
            word-break: break-word;
        }
        .lookup-popup[hidden] {
            display: none;
        }
        .lookup-popup .lookup-word {
            font-weight: 700;
            color: #bfdbfe;
        }
        .lookup-popup .lookup-error {
            color: #fecaca;
        }
        /* 按鈕 */
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-wrong { background-color: #fee2e2; color: #dc2626; }
        .btn-wrong:hover { background-color: #fecaca; }
        .btn-right { background-color: #dcfce7; color: var(--success); }
        .btn-right:hover { background-color: #bbf7d0; }
        
        .result-screen {
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .review-list-section {
            margin-top: 24px;
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
        }
        .review-list-section h2 {
            margin: 0 0 12px;
            font-size: 1.1rem;
            color: #0f172a;
        }
        .review-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .review-list button {
            width: 100%;
            min-height: 40px;
            padding: 9px 12px;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: left;
        }
        .review-list button:hover,
        .review-list button.active {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }
        .review-list button.review-right {
            background: #dcfce7;
            border-color: #86efac;
            color: #166534;
        }
        .review-list button.review-wrong {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }
        .review-list button.review-right.active,
        .review-list button.review-wrong.active {
            box-shadow: 0 0 0 2px var(--primary);
        }
        .review-list-empty {
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PTE 每日 50 單字盲抽考</h1>
        <span class="date-badge" id="today-date">-----</span>
        <div class="hint-text">💡 一天之內重開網頁單字不會變，但出場順序會打亂喔！</div>
    </header>

    <div id="quiz-box">
        <div class="stats">
            <span id="card-index">進度: -- / 50</span>
            <span style="color: var(--success);" id="score-count">已掌握: 0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="quiz-container">
            <div class="card" id="word-card" onclick="this.classList.toggle('flipped')">
                <div class="card-face card-front">
                    <h2 id="word-target">讀取字庫中...</h2>
                    <p>點擊卡片翻面看翻譯與例句</p>
                    <div class="voice-controls">
                        <button id="speak-word" class="speak-button" type="button" onclick="speakCurrentWord(event)" title="播放單字發音" aria-label="播放單字發音">🔊</button>
                        <select id="voice-select" class="voice-select" onchange="setSelectedVoice(this.value, event)" onclick="event.stopPropagation()" aria-label="選擇發音聲音"></select>
                    </div>
                </div>
                <div class="card-face card-back">
                    <h3 id="word-meaning">翻譯</h3>
                    <p class="example" id="word-example">例句載入中...</p>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-wrong" onclick="nextWord(false)">❌ 再想想</button>
            <button class="btn-right" onclick="nextWord(true)"> Hades 掌握</button>
        </div>

    </div>

    <section class="review-list-section" aria-labelledby="review-list-title">
        <h2 id="review-list-title">已瀏覽單字</h2>
        <ul id="review-list" class="review-list">
            <li class="review-list-empty">尚無已瀏覽單字</li>
        </ul>
    </section>

    <div id="result-box" class="result-screen" style="display: none;">
        <h2>🎉 今日抽考完成！</h2>
        <p style="font-size: 1.2rem; margin: 20px 0;">你的掌握度：<strong id="final-accuracy" style="color:var(--success); font-size: 2rem;">0%</strong></p>
        <p style="color: #64748b;">這 50 個單字今天已被鎖定。隨時重新整理網頁可以重新排序複習！</p>
    </div>
</div>
<div id="lookup-popup" class="lookup-popup" hidden role="status" aria-live="polite"></div>

<script>
let dailyWords = [];
let currentIndex = 0;
let score = 0;
let reviewedWords = [];
let availableVoices = [];
let selectedVoiceName = '';
let voiceLoadRetryCount = 0;
let vocabMeaningMap = new Map();

// 取得今天日期的字串 (格式: YYYY-MM-DD)
function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// 偽隨機演算法 (使用日期字串作為 Seed，確保同一天產生的隨機序列完全固定)
function seededRandom(seedString) {
    let hash = 0;
    for (let i = 0; i < seedString.length; i++) {
        hash = seedString.charCodeAt(i) + ((hash << 5) - hash);
    }
    return function() {
        let x = Math.sin(hash++) * 10000;
        return x - Math.floor(x);
    };
}

function normalizeVocabItems(vocabData) {
    const items = Array.isArray(vocabData) ? vocabData : vocabData.items;
    if (!Array.isArray(items)) {
        throw new Error('json 格式錯誤：找不到單字陣列');
    }

    return items.map(({ id, w, m, e }) => ({ id, w, m, e }));
}

function normalizeLookupWord(word) {
    return String(word).trim().toLowerCase();
}

function buildVocabMeaningMap(items) {
    const map = new Map();
    items.forEach((item) => {
        const key = normalizeLookupWord(item.w);
        if (key && item.m && !map.has(key)) {
            map.set(key, item.m);
        }
    });
    return map;
}

function getLocalVocabMeaning(word) {
    return vocabMeaningMap.get(normalizeLookupWord(word)) || '';
}

function renderExampleText(element, exampleText) {
    hideLookupPopup();
    element.innerHTML = '';

    const parts = String(exampleText).split(/(\*\*[^*]+\*\*)/g);
    parts.forEach((part) => {
        if (part.startsWith('**') && part.endsWith('**')) {
            const strong = document.createElement('strong');
            appendInteractiveExampleText(strong, part.slice(2, -2));
            element.appendChild(strong);
        } else if (part) {
            appendInteractiveExampleText(element, part);
        }
    });
}

function appendInteractiveExampleText(parent, text) {
    const tokens = String(text).split(/([A-Za-z][A-Za-z0-9]*(?:['-][A-Za-z0-9]+)?)/g);
    tokens.forEach((token) => {
        if (/^[A-Za-z][A-Za-z0-9]*(?:['-][A-Za-z0-9]+)?$/.test(token)) {
            parent.appendChild(createLookupWordButton(token));
        } else if (token) {
            parent.appendChild(document.createTextNode(token));
        }
    });
}

function createLookupWordButton(word) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'example-word';
    button.textContent = word;
    button.innerText = word;
    button.setAttribute('aria-label', `查詢 ${word} 的中文意思`);
    button.onclick = (event) => lookupExampleWordMeaning(word, button, event);
    return button;
}

function getLookupCacheKey(word) {
    return `example-meaning:${normalizeLookupWord(word)}`;
}

function getCachedOnlineMeaning(word) {
    try {
        return window.sessionStorage.getItem(getLookupCacheKey(word));
    } catch (error) {
        return null;
    }
}

function setCachedOnlineMeaning(word, meaning) {
    try {
        window.sessionStorage.setItem(getLookupCacheKey(word), meaning);
    } catch (error) {
        // Storage can be unavailable in private or restricted browser modes.
    }
}

function extractOnlineMeaning(data) {
    const candidates = [];
    if (Array.isArray(data && data.matches)) {
        data.matches.forEach((match) => {
            candidates.push(match && match.translation);
        });
    }
    candidates.push(data && data.responseData && data.responseData.translatedText);

    return candidates
        .map((candidate) => typeof candidate === 'string' ? candidate.trim() : '')
        .find((candidate) => /[\u3400-\u9fff]/.test(candidate))
        || '';
}

function isLookupQuotaError(data) {
    const details = String(data && data.responseDetails || '');
    return Boolean(
        data
        && (
            data.quotaFinished === true
            || data.responseStatus === 403
            || data.responseStatus === 429
            || /quota|limit|daily/i.test(details)
        )
    );
}

async function fetchOnlineMeaning(word) {
    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`);
    let data = null;
    try {
        data = await response.json();
    } catch (error) {
        if (!response.ok) throw new Error('lookup failed');
        throw error;
    }

    if (isLookupQuotaError(data)) throw new Error('lookup quota finished');
    if (!response.ok || data.responseStatus >= 400) throw new Error('lookup failed');

    const meaning = extractOnlineMeaning(data);
    if (!meaning) throw new Error('empty lookup result');

    return meaning;
}

function positionLookupPopup(anchorElement) {
    const popup = document.getElementById('lookup-popup');
    if (!popup || !anchorElement) return;

    const margin = 12;
    const anchorRect = anchorElement.getBoundingClientRect();
    const popupRect = popup.getBoundingClientRect();
    const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
    const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;

    let left = anchorRect.left + (anchorRect.width / 2) - (popupRect.width / 2);
    let top = anchorRect.bottom + 8;

    left = Math.max(margin, Math.min(left, viewportWidth - popupRect.width - margin));
    if (top + popupRect.height + margin > viewportHeight) {
        top = anchorRect.top - popupRect.height - 8;
    }
    top = Math.max(margin, top);

    popup.style.left = `${left}px`;
    popup.style.top = `${top}px`;
}

function renderLookupPopup(anchorElement, html) {
    const popup = document.getElementById('lookup-popup');
    if (!popup) return;

    popup.innerHTML = html;
    popup.hidden = false;
    positionLookupPopup(anchorElement);
}

function hideLookupPopup() {
    const popup = document.getElementById('lookup-popup');
    if (!popup) return;

    popup.hidden = true;
    popup.innerHTML = '';
}

function escapeHtml(text) {
    const span = document.createElement('span');
    span.textContent = String(text);
    return span.innerHTML;
}

async function lookupExampleWordMeaning(word, anchorElement, event) {
    if (event) {
        event.stopPropagation();
    }

    const lookupWord = String(word).trim();
    if (!lookupWord) return;

    const cachedMeaning = getCachedOnlineMeaning(lookupWord);
    if (cachedMeaning) {
        renderLookupPopup(anchorElement, `<span class="lookup-word">${escapeHtml(lookupWord)}</span>：${escapeHtml(cachedMeaning)}`);
        return;
    }

    const localMeaning = getLocalVocabMeaning(lookupWord);
    if (localMeaning) {
        setCachedOnlineMeaning(lookupWord, localMeaning);
        renderLookupPopup(anchorElement, `<span class="lookup-word">${escapeHtml(lookupWord)}</span>：${escapeHtml(localMeaning)}`);
        return;
    }

    renderLookupPopup(anchorElement, '查詢中...');

    try {
        const meaning = await fetchOnlineMeaning(lookupWord);
        setCachedOnlineMeaning(lookupWord, meaning);
        renderLookupPopup(anchorElement, `<span class="lookup-word">${escapeHtml(lookupWord)}</span>：${escapeHtml(meaning)}`);
    } catch (error) {
        const message = error && error.message === 'lookup quota finished'
            ? '線上查詢已達今日上限，請稍後再試'
            : '查詢失敗，請稍後再試';
        renderLookupPopup(anchorElement, `<span class="lookup-error">${message}</span>`);
    }
}

function canSpeak() {
    return 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
}

function updateSpeakButton() {
    const speakButton = document.getElementById('speak-word');
    if (!speakButton) return;

    speakButton.disabled = !canSpeak() || !dailyWords[currentIndex];
}

function loadAvailableVoices() {
    if (!canSpeak()) return [];

    availableVoices = window.speechSynthesis
        .getVoices()
        .filter((voice) => voice.lang && voice.lang.startsWith('en'));

    return availableVoices;
}

function getPreferredVoice() {
    if (!canSpeak()) return null;

    const voices = availableVoices.length ? availableVoices : loadAvailableVoices();
    const selectedVoice = voices.find((voice) => voice.name === selectedVoiceName);
    if (selectedVoice) return selectedVoice;

    const preferredVoiceNames = [
        'Google US English',
        'Microsoft Aria Online',
        'Microsoft Jenny Online',
        'Microsoft Guy Online',
        'Samantha',
    ];

    return preferredVoiceNames
        .map((voiceName) => voices.find((voice) => voice.name.includes(voiceName)))
        .find(Boolean)
        || voices.find((voice) => voice.lang === 'en-US')
        || voices.find((voice) => voice.lang && voice.lang.startsWith('en'))
        || null;
}

function renderVoiceSelect() {
    const voiceSelect = document.getElementById('voice-select');
    if (!voiceSelect) return;

    const voices = loadAvailableVoices();
    voiceSelect.innerHTML = '';

    if (voices.length === 0) {
        const option = document.createElement('option');
        option.value = '';
        option.innerText = canSpeak() ? '使用瀏覽器預設聲音' : '瀏覽器不支援語音';
        voiceSelect.appendChild(option);
        voiceSelect.disabled = true;
        return;
    }

    const preferredVoice = getPreferredVoice();
    selectedVoiceName = selectedVoiceName || (preferredVoice ? preferredVoice.name : voices[0].name);

    voices.forEach((voice) => {
        const option = document.createElement('option');
        option.value = voice.name;
        option.innerText = `${voice.name} (${voice.lang})`;
        option.selected = voice.name === selectedVoiceName;
        voiceSelect.appendChild(option);
    });

    voiceSelect.disabled = false;
}

function retryLoadVoices() {
    if (!canSpeak()) return;

    renderVoiceSelect();
    if (availableVoices.length > 0 || voiceLoadRetryCount >= 20) return;

    voiceLoadRetryCount++;
    setTimeout(retryLoadVoices, 250);
}

function setSelectedVoice(voiceName, event) {
    if (event) {
        event.stopPropagation();
    }

    selectedVoiceName = voiceName;
}

function speakCurrentWord(event) {
    if (event) {
        event.stopPropagation();
    }

    if (!canSpeak() || !dailyWords[currentIndex]) return;

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(dailyWords[currentIndex].w);
    utterance.lang = 'en-US';
    utterance.rate = 0.85;
    const preferredVoice = getPreferredVoice();
    if (preferredVoice) {
        utterance.voice = preferredVoice;
        utterance.lang = preferredVoice.lang;
    }
    window.speechSynthesis.speak(utterance);
}

// 讀取外部 json 字庫並初始化
async function loadAndInitQuiz() {
    const todayStr = getTodayString();
    document.getElementById('today-date').innerText = `今天日期：${todayStr}`;

    try {
        // 讀取同資料夾下的 pte_vocab_2000.json
        const response = await fetch('pte_vocab_2000.json');
        if (!response.ok) throw new Error('找不到 json 檔案');
        const vocabData = await response.json();
        const allVocab = normalizeVocabItems(vocabData);
        vocabMeaningMap = buildVocabMeaningMap(allVocab);

        // 1. 使用「當天日期」作為種子，從 2000 個字中挑出固定的 50 個字
        const myRandom = seededRandom(todayStr);
        let pool = [...allVocab];
        
        // 用日期種子打亂大水庫
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(myRandom() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        // 取得當天專屬的固定 50 個字
        let locked50Words = pool.slice(0, 50);

        // 2. 對這固定的 50 個字，進行一般的「純隨機打亂」
        // 這樣每次使用者「重新整理/重開網頁」，都是這50個字，但順序都會完全不同
        dailyWords = locked50Words.sort(() => Math.random() - 0.5);

        currentIndex = 0;
        score = 0;
        reviewedWords = [];
        retryLoadVoices();
        renderReviewList();
        showWord();

    } catch (error) {
        document.getElementById('word-target').innerText = "錯誤";
        document.getElementById('word-example').innerText = "請確保 pte_vocab_2000.json 與網頁放在同一個資料夾內！";
        console.error(error);
    }
}

function showWord() {
    if (currentIndex >= dailyWords.length) {
        showResult();
        return;
    }
    hideLookupPopup();
    
    // 恢復未翻面狀態
    document.getElementById('word-card').classList.remove('flipped');
    
    const current = dailyWords[currentIndex];
    
    // 延遲更新文字，避免翻轉時提前露餡
    setTimeout(() => {
        document.getElementById('word-target').innerText = current.w;
        document.getElementById('word-meaning').innerText = current.m;
        renderExampleText(document.getElementById('word-example'), current.e);
        updateSpeakButton();
    }, 150);

    // 更新介面進度條
    document.getElementById('card-index').innerText = `進度: ${currentIndex + 1} / ${dailyWords.length}`;
    document.getElementById('score-count').innerText = `已掌握: ${score}`;
    const progressPercent = (currentIndex / dailyWords.length) * 100;
    document.getElementById('progress').style.width = `${progressPercent}%`;
    renderReviewList();
    updateSpeakButton();
}

function nextWord(isRight) {
    markCurrentWordReviewed(isRight);
    if (isRight) score++;
    currentIndex++;
    showWord();
}

function markCurrentWordReviewed(isRight) {
    const reviewedWord = reviewedWords.find((word) => word.index === currentIndex);

    if (reviewedWord) {
        reviewedWord.isRight = isRight;
    } else {
        reviewedWords.push({
            index: currentIndex,
            isRight,
        });
    }
}

function renderReviewList() {
    const list = document.getElementById('review-list');
    if (!list) return;

    list.innerHTML = '';

    if (reviewedWords.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'review-list-empty';
        emptyItem.innerText = '尚無已瀏覽單字';
        list.appendChild(emptyItem);
        return;
    }

    reviewedWords.forEach((reviewedWord) => {
        const word = dailyWords[reviewedWord.index];
        if (!word) return;

        const item = document.createElement('li');
        const button = document.createElement('button');
        button.type = 'button';
        button.innerText = word.w;
        button.onclick = () => jumpToWord(reviewedWord.index);
        button.classList.toggle('active', reviewedWord.index === currentIndex);
        button.classList.add(reviewedWord.isRight ? 'review-right' : 'review-wrong');
        item.appendChild(button);
        list.appendChild(item);
    });
}

function jumpToWord(wordIndex) {
    currentIndex = wordIndex;
    showWord();
}

function showResult() {
    hideLookupPopup();
    document.getElementById('quiz-box').style.display = 'none';
    document.getElementById('result-box').style.display = 'block';
    
    const accuracy = Math.round((score / dailyWords.length) * 100);
    document.getElementById('final-accuracy').innerText = `${accuracy}%`;
}

// 開啟網頁自動執行
window.onload = loadAndInitQuiz;
if (canSpeak()) {
    window.speechSynthesis.onvoiceschanged = retryLoadVoices;
}
document.addEventListener('click', (event) => {
    const popup = document.getElementById('lookup-popup');
    if (
        popup
        && !popup.hidden
        && !popup.contains(event.target)
        && !event.target.closest('.example-word')
    ) {
        hideLookupPopup();
    }
});
</script>

</body>
</html>
