<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTE 每日跨日鎖定抽考系統</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #ca8a04;
            --background: #f1f5f9;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 5px; color: #0f172a; font-size: 1.8rem; }
        .date-badge {
            background-color: #e2e8f0;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #475569;
            font-weight: bold;
        }
        .hint-text {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 5px;
        }
        .progress-bar {
            background-color: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }
        /* 翻牌卡片 */
        .quiz-container {
            perspective: 1000px;
            height: 260px;
            margin-bottom: 25px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s ease;
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 25px;
            box-sizing: border-box;
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
        }
        .card-front h2 {
            font-size: 2.4rem;
            color: var(--primary);
            margin: 0;
            letter-spacing: 0.5px;
        }
        .card-front p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: #f8fafc;
        }
        .card-back h3 {
            font-size: 1.6rem;
            color: #0f172a;
            margin: 0 0 12px 0;
        }
        .example {
            font-style: italic;
            color: #475569;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.4;
            background: #edd;
            padding: 10px;
            border-radius: 8px;
            background-color: #f1f5f9;
        }
        /* 按鈕 */
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-wrong { background-color: #fee2e2; color: #dc2626; }
        .btn-wrong:hover { background-color: #fecaca; }
        .btn-right { background-color: #dcfce7; color: var(--success); }
        .btn-right:hover { background-color: #bbf7d0; }
        
        .result-screen {
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .review-list-section {
            margin-top: 24px;
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
        }
        .review-list-section h2 {
            margin: 0 0 12px;
            font-size: 1.1rem;
            color: #0f172a;
        }
        .review-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .review-list button {
            width: 100%;
            min-height: 40px;
            padding: 9px 12px;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: left;
        }
        .review-list button:hover,
        .review-list button.active {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }
        .review-list button.review-right {
            background: #dcfce7;
            border-color: #86efac;
            color: #166534;
        }
        .review-list button.review-wrong {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }
        .review-list button.review-right.active,
        .review-list button.review-wrong.active {
            box-shadow: 0 0 0 2px var(--primary);
        }
        .review-list-empty {
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PTE 每日 50 單字盲抽考</h1>
        <span class="date-badge" id="today-date">-----</span>
        <div class="hint-text">💡 一天之內重開網頁單字不會變，但出場順序會打亂喔！</div>
    </header>

    <div id="quiz-box">
        <div class="stats">
            <span id="card-index">進度: -- / 50</span>
            <span style="color: var(--success);" id="score-count">已掌握: 0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="quiz-container">
            <div class="card" id="word-card" onclick="this.classList.toggle('flipped')">
                <div class="card-face card-front">
                    <h2 id="word-target">讀取字庫中...</h2>
                    <p>點擊卡片翻面看翻譯與例句</p>
                </div>
                <div class="card-face card-back">
                    <h3 id="word-meaning">翻譯</h3>
                    <p class="example" id="word-example">例句載入中...</p>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-wrong" onclick="nextWord(false)">❌ 再想想</button>
            <button class="btn-right" onclick="nextWord(true)"> Hades 掌握</button>
        </div>

    </div>

    <section class="review-list-section" aria-labelledby="review-list-title">
        <h2 id="review-list-title">已瀏覽單字</h2>
        <ul id="review-list" class="review-list">
            <li class="review-list-empty">尚無已瀏覽單字</li>
        </ul>
    </section>

    <div id="result-box" class="result-screen" style="display: none;">
        <h2>🎉 今日抽考完成！</h2>
        <p style="font-size: 1.2rem; margin: 20px 0;">你的掌握度：<strong id="final-accuracy" style="color:var(--success); font-size: 2rem;">0%</strong></p>
        <p style="color: #64748b;">這 50 個單字今天已被鎖定。隨時重新整理網頁可以重新排序複習！</p>
    </div>
</div>

<script>
let dailyWords = [];
let currentIndex = 0;
let score = 0;
let reviewedWords = [];

// 取得今天日期的字串 (格式: YYYY-MM-DD)
function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// 偽隨機演算法 (使用日期字串作為 Seed，確保同一天產生的隨機序列完全固定)
function seededRandom(seedString) {
    let hash = 0;
    for (let i = 0; i < seedString.length; i++) {
        hash = seedString.charCodeAt(i) + ((hash << 5) - hash);
    }
    return function() {
        let x = Math.sin(hash++) * 10000;
        return x - Math.floor(x);
    };
}

// 讀取外部 json 字庫並初始化
async function loadAndInitQuiz() {
    const todayStr = getTodayString();
    document.getElementById('today-date').innerText = `今天日期：${todayStr}`;

    try {
        // 讀取同資料夾下的 pte_vocab_2000.json
        const response = await fetch('pte_vocab_2000.json');
        if (!response.ok) throw new Error('找不到 json 檔案');
        const allVocab = await response.json();

        // 1. 使用「當天日期」作為種子，從 2000 個字中挑出固定的 50 個字
        const myRandom = seededRandom(todayStr);
        let pool = [...allVocab];
        
        // 用日期種子打亂大水庫
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(myRandom() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        // 取得當天專屬的固定 50 個字
        let locked50Words = pool.slice(0, 50);

        // 2. 對這固定的 50 個字，進行一般的「純隨機打亂」
        // 這樣每次使用者「重新整理/重開網頁」，都是這50個字，但順序都會完全不同
        dailyWords = locked50Words.sort(() => Math.random() - 0.5);

        currentIndex = 0;
        score = 0;
        reviewedWords = [];
        renderReviewList();
        showWord();

    } catch (error) {
        document.getElementById('word-target').innerText = "錯誤";
        document.getElementById('word-example').innerText = "請確保 pte_vocab_2000.json 與網頁放在同一個資料夾內！";
        console.error(error);
    }
}

function showWord() {
    if (currentIndex >= dailyWords.length) {
        showResult();
        return;
    }
    
    // 恢復未翻面狀態
    document.getElementById('word-card').classList.remove('flipped');
    
    const current = dailyWords[currentIndex];
    
    // 延遲更新文字，避免翻轉時提前露餡
    setTimeout(() => {
        document.getElementById('word-target').innerText = current.w;
        document.getElementById('word-meaning').innerText = current.m;
        document.getElementById('word-example').innerText = current.e;
    }, 150);

    // 更新介面進度條
    document.getElementById('card-index').innerText = `進度: ${currentIndex + 1} / ${dailyWords.length}`;
    document.getElementById('score-count').innerText = `已掌握: ${score}`;
    const progressPercent = (currentIndex / dailyWords.length) * 100;
    document.getElementById('progress').style.width = `${progressPercent}%`;
    renderReviewList();
}

function nextWord(isRight) {
    markCurrentWordReviewed(isRight);
    if (isRight) score++;
    currentIndex++;
    showWord();
}

function markCurrentWordReviewed(isRight) {
    const reviewedWord = reviewedWords.find((word) => word.index === currentIndex);

    if (reviewedWord) {
        reviewedWord.isRight = isRight;
    } else {
        reviewedWords.push({
            index: currentIndex,
            isRight,
        });
    }
}

function renderReviewList() {
    const list = document.getElementById('review-list');
    if (!list) return;

    list.innerHTML = '';

    if (reviewedWords.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'review-list-empty';
        emptyItem.innerText = '尚無已瀏覽單字';
        list.appendChild(emptyItem);
        return;
    }

    reviewedWords.forEach((reviewedWord) => {
        const word = dailyWords[reviewedWord.index];
        if (!word) return;

        const item = document.createElement('li');
        const button = document.createElement('button');
        button.type = 'button';
        button.innerText = word.w;
        button.onclick = () => jumpToWord(reviewedWord.index);
        button.classList.toggle('active', reviewedWord.index === currentIndex);
        button.classList.add(reviewedWord.isRight ? 'review-right' : 'review-wrong');
        item.appendChild(button);
        list.appendChild(item);
    });
}

function jumpToWord(wordIndex) {
    currentIndex = wordIndex;
    showWord();
}

function showResult() {
    document.getElementById('quiz-box').style.display = 'none';
    document.getElementById('result-box').style.display = 'block';
    
    const accuracy = Math.round((score / dailyWords.length) * 100);
    document.getElementById('final-accuracy').innerText = `${accuracy}%`;
}

// 開啟網頁自動執行
window.onload = loadAndInitQuiz;
</script>

</body>
</html>
